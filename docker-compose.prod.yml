services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      - CONNECTION_STRING=${CONNECTION_STRING}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
    expose:
      - "3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
