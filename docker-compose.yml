services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - CONNECTION_STRING=${CONNECTION_STRING}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}

    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules

    develop:
      watch:
        - action: sync+restart
          path: ./Backend
          target: /app
          ignore:
            - node_modules/

    restart: unless-stopped


  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules

    develop:
      watch:
        - action: sync
          path: ./Frontend
          target: /app
          ignore:
            - node_modules/

    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules: 